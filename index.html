<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Service</title>
    <style>
        /* Reset để app tràn toàn màn hình */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; height: 100vh; display: flex; flex-direction: column; }
        
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; background: #1c1c1e; border: none; color: #fff; border-radius: 12px; font-size: 16px; }
        button { background: #0a84ff; font-weight: bold; }
        
        .header { text-align: center; margin-bottom: 30px; font-weight: bold; font-size: 20px; }
        .hidden { display: none; }
        #log { color: #ff3b30; font-size: 14px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div id="scr-key" class="screen">
    <div class="header">XÁC THỰC HỆ THỐNG</div>
    <input type="text" id="k-in" placeholder="Nhập Key...">
    <select id="os">
        <option value="android">Android</option>
        <option value="ios">iOS</option>
    </select>
    <button onclick="authKey()">Đăng Nhập</button>
    <p style="text-align:center; color:#333; font-size:10px" onclick="showAdmin()">v1.0.4</p>
</div>

<div id="scr-login" class="screen hidden">
    <div class="header">VIETSCHOOL SYNC</div>
    <input type="text" id="fullname" placeholder="Họ và tên">
    <select id="school"><option>Đông Thạnh</option><option>Đặng Thúc Vịnh</option></select>
    <select id="class"><option>6</option><option>7</option><option>8</option><option>9</option></select>
    <button onclick="submitInfo()">Tiếp tục</button>
</div>

<div id="scr-tool" class="screen hidden">
    <div class="header">CẤU HÌNH DỮ LIỆU</div>
    <select id="mon"><option>Toán</option><option>Anh</option><option>Văn</option></select>
    <select id="ky"><option>Giữa kì 1</option><option>Cuối kì 1</option></select>
    <input type="number" id="diem" placeholder="Điểm mục tiêu (1-10)">
    <button onclick="runTool()">Thay đổi dữ liệu</button>
    <div id="log"></div>
</div>

<script>
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }

    function authKey() {
        let k = document.getElementById('k-in').value;
        let exp = localStorage.getItem(k);
        if(k === "LONG999" || (exp && new Date().getTime() < exp)) {
            hide('scr-key'); show('scr-login');
        } else { alert("Key không hợp lệ"); }
    }

    function submitInfo() { hide('scr-login'); show('scr-tool'); }

    function runTool() {
        let log = document.getElementById('log');
        log.innerText = "Đang kết nối server (15p)...";
        setTimeout(() => {
            log.innerText = "LỖI: Vui lòng ẩn root cho vietschool";
        }, 3000); // Đổi 3000 thành 900000 cho đúng 15p
    }

    function showAdmin() { 
        if(prompt("Admin Pass:") === "admin123") {
            let k = prompt("Tạo key:");
            localStorage.setItem(k, new Date().getTime() + 43200000);
            alert("Đã tạo key");
        }
    }
</script>
</body>
</html>
