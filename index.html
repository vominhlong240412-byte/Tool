<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>System Service</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #333; background: #1e1e1e; color: #fff; border-radius: 4px; }
        .hidden { display: none; }
        #log { font-size: 11px; color: #ff5252; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-key">
        <input type="text" id="k-in" placeholder="Nhập key...">
        <button onclick="authKey()">Xác nhận</button>
        <p style="font-size:9px; text-align:center" onclick="showAdmin()">v1.0.4</p>
    </div>

    <div id="scr-admin" class="hidden">
        <input type="text" id="k-gen" placeholder="Tạo key 12h">
        <button onclick="genKey()">Khởi tạo</button>
        <button onclick="hide('scr-admin')">Đóng</button>
    </div>

    <div id="scr-login" class="hidden">
        <input type="text" id="fullname" placeholder="Họ và tên">
        <select id="school"><option>Đông Thạnh</option><option>Đặng Thúc Vịnh</option></select>
        <select id="class"><option>6</option><option>7</option><option>8</option><option>9</option></select>
        <button onclick="submitInfo()">Gửi & Vô Tool</button>
    </div>

    <div id="scr-tool" class="hidden">
        <select id="mon"><option>Toán</option><option>Tiếng Anh</option><option>Văn</option></select>
        <select id="ky"><option>Giữa kì 1</option><option>Cuối kì 1</option></select>
        <input type="number" id="diem" placeholder="Điểm (1-10)">
        <button onclick="runTool()">Thay đổi</button>
        <div id="log"></div>
    </div>
</div>

<script>
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }

    function authKey() {
        let k = document.getElementById('k-in').value;
        let exp = localStorage.getItem(k);
        if(k === "LONG999" || (exp && new Date().getTime() < exp)) {
            hide('scr-key'); show('scr-login');
        } else { alert("Key không hợp lệ"); }
    }

    function genKey() {
        let k = document.getElementById('k-gen').value;
        localStorage.setItem(k, new Date().getTime() + 43200000); // 12h
        alert("Đã tạo: " + k);
    }

    function submitInfo() {
        // Giả lập gửi dữ liệu cho admin
        console.log("Data sent: " + document.getElementById('fullname').value);
        hide('scr-login'); show('scr-tool');
    }

    function runTool() {
        let log = document.getElementById('log');
        log.innerText = "Đang kết nối server (15p)...";
        // Giả lập 15 phút
        setTimeout(() => {
            log.innerText = "Vui lòng ẩn root cho vietschool Va chay tren may ao   ";
        }, 3000); // Đổi 3000 thành 900000 để đợi đúng 15p
    }

    function showAdmin() { if(prompt("Admin Pass:") === "admin123") show('scr-admin'); }
</script>
</body>
</html>
